<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Carrito - Cool Center</title>
<link rel="stylesheet" href="style.css">
</head>
<body>


<header class="top-header">
    <div class="brand">
        Cool Center
    </div>

    <div class="top-actions" id="usuarioHeader">
        <a href="carrito.html" class="icon">🛒 <span id="contadorCarrito">0</span></a>
        <a href="login.html">Login</a>
        <span>|</span>
        <a href="registro.html">Registro</a>
    </div>
</header>

<nav class="main-nav">
    <a href="index.html">Inicio</a>
    <a href="inventario.html">Inventario</a>
    <a href="contacto.html">Contacto</a>
</nav>


<div class="container">
<h2>Productos en el carrito</h2>


<table>
<thead>
<tr>
    <th>Imagen</th>
    <th>Producto</th>
    <th>Precio</th>
    <th>Cantidad</th>
    <th>Subtotal</th>
    <th>Acción</th>
</tr>
</thead>
<tbody id="carrito"></tbody>
</table>

<div id="totalCarrito" style="margin-top: 20px; font-size: 18px; font-weight: 600;">
    Total: $0
</div>

<button class="vaciar" onclick="vaciarCarrito()">
    Vaciar carrito
</button>
<button class="vaciar" onclick="finalizarCompra()" style="background:#16a34a;">
    Finalizar compra
</button>
</div>


<footer class="footer">2025 Cool Center</footer>


<script src="script.js"></script>
</body>
</html>
